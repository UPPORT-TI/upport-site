<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada — Üpport</title>
    <link rel="icon" type="image/png" href="assets/fav.png?v=1.1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #1b3a6b;
            --blue-gradient: linear-gradient(135deg, #1b3a6b 0%, #2d5ba0 100%);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --font-display: "Plus Jakarta Sans", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #f6f8fb; 
            color: var(--text-secondary); 
            font-family: var(--font-display); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .error-container {
            max-width: 500px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: var(--blue-gradient);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 800;
            color: white;
            margin: 0 auto 32px;
            box-shadow: 0 10px 30px rgba(27, 58, 107, 0.2);
        }

        h1 { font-size: 80px; font-weight: 800; color: var(--accent); line-height: 1; margin-bottom: 16px; opacity: 0.1; }
        h2 { font-size: 24px; color: var(--text-primary); margin-bottom: 16px; }
        p { margin-bottom: 32px; font-size: 16px; line-height: 1.6; }

        .btn {
            display: inline-block;
            background: var(--blue-gradient);
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(27, 58, 107, 0.25);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(27, 58, 107, 0.35);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="logo-icon">Ü</div>
        <h1>404</h1>
        <h2>Oops! Página não encontrada.</h2>
        <p>Parece que o caminho que você está tentando acessar não existe ou foi movido. Quer voltar para nossa página principal?</p>
        <a href="/" class="btn">Voltar para a Home</a>
    </div>
</body>
</html>
